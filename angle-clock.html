<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>數學小遊戲</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14203a;
    --minute:#2563eb;
    --second:#e0492f;
    --paper:#eef1f6;
    --face:#ffffff;
    --tick:#cbd5e1;
    --tick-major:#475569;
    --muted:#64748b;
    --line:#dbe1ea;
    --c-overlap:#0d9488;
    --c-lead:#2563eb;
    --c-straight:#d97706;
    --c-lag:#db2777;
    --arc:#0d9488;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Noto Sans TC",system-ui,-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
    background:radial-gradient(circle at 15% 0%, #f6f8fc 0%, transparent 55%),var(--paper);
    color:var(--ink);min-height:100vh;padding:20px 16px 40px;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1000px;margin:0 auto;}
  header{margin:0 auto 16px;}
  h1{font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-size:clamp(21px,4.6vw,30px);
     letter-spacing:.5px;margin:0;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
  h1 .en{font-size:.6em;color:var(--muted);font-weight:500;letter-spacing:2px;text-transform:uppercase;}
  .sub{color:var(--muted);font-size:13.5px;margin-top:5px;}

  .layout{display:flex;gap:24px;align-items:flex-start;}
  @media(max-width:820px){ .layout{flex-direction:column;align-items:stretch;gap:14px;} }

  /* ---------- 時鐘 ---------- */
  .clock-col{flex:0 0 auto;width:min(440px,100%);margin:0 auto;}
  .clock-card{background:var(--face);border:1px solid var(--line);border-radius:20px;
    padding:16px 16px 12px;box-shadow:0 18px 40px -24px rgba(20,32,58,.4);}
  svg.clock{display:block;width:100%;height:auto;margin:0 auto;touch-action:none;}
  .num{font-family:"Space Grotesk",sans-serif;font-weight:700;fill:var(--ink);font-size:19px;}
  .hand{stroke-linecap:round;}
  #handHour{stroke:var(--ink);stroke-width:9;}
  #handMin{stroke:var(--minute);stroke-width:6;}
  #handSec{stroke:var(--second);stroke-width:2.4;}
  #arcLabelBg{fill:var(--face);}
  #arcLabel{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:15px;fill:var(--arc);}
  #angleArc{fill:none;stroke:var(--arc);stroke-width:3;stroke-linecap:round;opacity:.9;}
  .arc-hidden #angleArc,.arc-hidden #arcLabel,.arc-hidden #arcLabelBg{display:none;}

  .clock-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:6px;flex-wrap:wrap;}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted);}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend i{width:15px;height:4px;border-radius:3px;display:inline-block;}

  /* ---------- 讀數（上下兩行置中） ---------- */
  .readout{display:flex;flex-direction:column;align-items:center;gap:7px;
    background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:10px 12px;margin-top:11px;}
  .r-time{text-align:center;}
  .r-time .k{font-size:11px;color:var(--muted);letter-spacing:.5px;}
  .r-time .v{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:24px;line-height:1.1;}
  .r-time .v sup{font-size:.5em;color:var(--muted);font-weight:500;}
  .r-stats{display:flex;justify-content:center;gap:6px 12px;flex-wrap:wrap;width:100%;}
  .stat{flex:0 0 auto;width:66px;text-align:center;}
  .stat .k{font-size:10.5px;color:var(--muted);letter-spacing:.3px;}
  .stat .v{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:15px;line-height:1.2;}
  .stat.hour .v{color:var(--ink);}
  .stat.min .v{color:var(--minute);}
  .stat.angle .v{color:var(--arc);}
  .stat.rel .v{color:var(--arc);}

  .toolbar{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
  .tool{flex:1 1 auto;border:1px solid var(--line);background:#fff;color:var(--ink);font-family:inherit;
    font-size:13.5px;font-weight:500;padding:9px 12px;border-radius:11px;cursor:pointer;transition:.15s;
    display:flex;align-items:center;justify-content:center;gap:6px;min-width:120px;}
  .tool:hover{border-color:var(--ink);}
  .tool:active{transform:translateY(1px);}
  .tool.live{background:var(--ink);color:#fff;border-color:var(--ink);}
  .tool.live .dot{width:7px;height:7px;border-radius:50%;background:var(--second);animation:blink 1s steps(2) infinite;}
  @keyframes blink{50%{opacity:.25;}}
  .chk{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;}
  .chk input{accent-color:var(--arc);width:15px;height:15px;}

  /* ---------- 控制：2×2 分類 + 共用面板 ---------- */
  .panel{flex:1 1 320px;min-width:0;}
  .panel-head{font-size:12.5px;color:var(--muted);margin:0 2px 9px;letter-spacing:.3px;line-height:1.5;}
  .cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .cat{display:flex;flex-direction:column;gap:6px;align-items:flex-start;text-align:left;
    border:1.5px solid var(--line);background:#fff;border-radius:14px;padding:12px 13px;cursor:pointer;
    font-family:inherit;color:var(--ink);transition:.14s;position:relative;}
  .cat:hover{border-color:var(--gc);}
  .cat:active{transform:translateY(1px);}
  .cat.on{border-color:var(--gc);background:color-mix(in srgb,var(--gc) 8%,#fff);box-shadow:0 0 0 1px var(--gc) inset;}
  .cat-row{display:flex;align-items:center;gap:8px;width:100%;}
  .cat .swatch{width:11px;height:11px;border-radius:3px;background:var(--gc);flex:0 0 auto;}
  .cat-badge{margin-left:auto;font-family:"JetBrains Mono",monospace;font-weight:700;font-size:12.5px;
    color:var(--gc);background:color-mix(in srgb,var(--gc) 12%,#fff);padding:2px 8px;border-radius:999px;}
  .cat-title{font-size:14px;font-weight:700;line-height:1.3;}

  .cat-panel{margin-top:12px;border:1.5px solid var(--gc);border-radius:14px;background:#fff;
    overflow:hidden;max-height:0;opacity:0;transition:max-height .28s ease,opacity .2s;}
  .cat-panel.show{max-height:520px;opacity:1;}
  .cp-head{display:flex;align-items:center;gap:9px;padding:11px 13px;border-bottom:1px solid var(--line);}
  .cp-head .swatch{width:11px;height:11px;border-radius:3px;background:var(--gc);}
  .cp-head .t{font-weight:700;font-size:14.5px;flex:1;}
  .cp-close{border:0;background:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:2px 4px;}
  .cp-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(86px,1fr));gap:8px;padding:12px 13px;}
  .tbtn{border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;font-family:inherit;
    padding:9px 4px;color:var(--ink);transition:.13s;display:flex;flex-direction:column;align-items:center;gap:1px;}
  .tbtn:hover{border-color:var(--gc);background:color-mix(in srgb,var(--gc) 7%,#fff);}
  .tbtn:active{transform:translateY(1px);}
  .tbtn .bt-time{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:14px;letter-spacing:-.3px;}
  .tbtn .bt-frac{font-size:10px;opacity:.7;font-family:"JetBrains Mono",monospace;}

  footer{max-width:1000px;margin:20px auto 0;font-size:12px;color:var(--muted);text-align:center;line-height:1.6;}

  /* ---------- 手機：塞進一個畫面 ---------- */
  @media(max-width:560px){
    body{padding:10px 12px 24px;}
    header{margin-bottom:8px;}
    .sub{font-size:12px;}
    .layout{gap:10px;}
    .clock-card{padding:12px 12px 8px;border-radius:18px;}
    svg.clock{max-width:min(82vw,43vh,340px);}
    .clock-meta{margin-top:4px;}
    .readout{margin-top:8px;padding:9px 12px;}
    .r-time .v{font-size:22px;}
    .stat{width:62px;}
    .toolbar{margin-top:7px;}
    .panel-head{display:none;}
    .cat-title{font-size:13px;}
    .cat{padding:10px 12px;}
    footer{margin-top:14px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>角度時鐘 <span class="en">Angle Clock</span></h1>
    <div class="sub">探索時針與分針的角度關係:重合、垂直、成一直線。</div>
  </header>

  <div class="layout">
    <!-- 時鐘 -->
    <div class="clock-col">
      <div class="clock-card">
        <svg class="clock" id="clock" viewBox="0 0 400 400" aria-label="時鐘">
          <circle cx="200" cy="200" r="190" fill="var(--face)"/>
          <circle cx="200" cy="200" r="188" fill="none" stroke="var(--line)" stroke-width="2"/>
          <g id="ticks"></g>
          <g id="numbers"></g>
          <path id="angleArc" d=""></path>
          <rect id="arcLabelBg" x="0" y="0" width="0" height="0" rx="5"></rect>
          <text id="arcLabel" text-anchor="middle" dominant-baseline="central"></text>
          <line id="handHour" class="hand" x1="200" y1="216" x2="200" y2="120"></line>
          <line id="handMin"  class="hand" x1="200" y1="220" x2="200" y2="86"></line>
          <line id="handSec"  class="hand" x1="200" y1="226" x2="200" y2="72"></line>
          <circle cx="200" cy="200" r="8" fill="var(--ink)"></circle>
          <circle cx="200" cy="200" r="3.4" fill="var(--second)"></circle>
        </svg>

        <div class="clock-meta">
          <div class="legend">
            <span><i style="background:var(--ink)"></i>時針</span>
            <span><i style="background:var(--minute)"></i>分針</span>
            <span><i style="background:var(--second)"></i>秒針</span>
          </div>
          <label class="chk"><input type="checkbox" id="chkArc" checked>夾角弧線</label>
        </div>

        <div class="readout">
          <div class="r-time"><div class="k">目前時間</div><div class="v" id="roTime">12:00:00</div></div>
          <div class="r-stats">
            <div class="stat hour"><div class="k">時針</div><div class="v" id="roHour">0°</div></div>
            <div class="stat min"><div class="k">分針</div><div class="v" id="roMin">0°</div></div>
            <div class="stat angle"><div class="k">夾角</div><div class="v" id="roAngle">0°</div></div>
            <div class="stat rel"><div class="k">分針領先</div><div class="v" id="roRel">0°</div></div>
          </div>
        </div>

        <div class="toolbar">
          <button class="tool" id="btnLive"><span class="dot" style="display:none"></span><span id="liveText">同步現在時間</span></button>
          <button class="tool" id="btnReset">回到 12:00</button>
        </div>
      </div>
    </div>

    <!-- 控制 -->
    <div class="panel">
      <div class="panel-head">選一種角度關係,再挑一個時間,時針與分針會轉過去(以 12 點方向為 0°、順時針計算)。</div>
      <div class="cat-grid" id="catGrid"></div>
      <div class="cat-panel" id="catPanel">
        <div class="cp-head"><span class="swatch"></span><span class="t" id="cpTitle"></span><button class="cp-close" id="cpClose" aria-label="收合">×</button></div>
        <div class="cp-body" id="cpBody"></div>
      </div>
    </div>
  </div>

  <footer>
    每種關係在 12 小時內各有 11 個時間點,標示的秒數為精確值(<span style="font-family:'JetBrains Mono',monospace">n⁄11</span> 秒),可直接作為時鐘角度問題的標準答案。
  </footer>
</div>

<script>
(function(){
  "use strict";
  const CX=200, CY=200, svgns="http://www.w3.org/2000/svg";
  const el=id=>document.getElementById(id);

  /* 刻度與數字 */
  const gTicks=el("ticks"), gNum=el("numbers");
  for(let i=0;i<60;i++){
    const a=i*6*Math.PI/180, major=(i%5===0), r1=178, r2=major?162:170;
    const ln=document.createElementNS(svgns,"line");
    ln.setAttribute("x1",CX+r1*Math.sin(a)); ln.setAttribute("y1",CY-r1*Math.cos(a));
    ln.setAttribute("x2",CX+r2*Math.sin(a)); ln.setAttribute("y2",CY-r2*Math.cos(a));
    ln.setAttribute("stroke",major?"var(--tick-major)":"var(--tick)");
    ln.setAttribute("stroke-width",major?3:1.5); ln.setAttribute("stroke-linecap","round");
    gTicks.appendChild(ln);
  }
  for(let n=1;n<=12;n++){
    const a=n*30*Math.PI/180, R=142;
    const t=document.createElementNS(svgns,"text");
    t.setAttribute("x",CX+R*Math.sin(a)); t.setAttribute("y",CY-R*Math.cos(a));
    t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","central");
    t.setAttribute("class","num"); t.textContent=n; gNum.appendChild(t);
  }

  /* 四種關係：t = (base + 720k)/11 分鐘,k=0..10 */
  const GROUPS=[
    {title:"時針分針重合",     tag:"0°",   base:0,   color:"var(--c-overlap)"},
    {title:"分針領先時針 90°", tag:"90°",  base:180, color:"var(--c-lead)"},
    {title:"時針分針成一直線", tag:"180°", base:360, color:"var(--c-straight)"},
    {title:"分針落後時針 90°", tag:"270°", base:540, color:"var(--c-lag)"},
  ];

  const pad=v=>String(v).padStart(2,"0");
  function parts(t){
    let hh=Math.floor(t/60)%12; if(hh===0) hh=12;
    const mm=Math.floor(t)%60, secEx=(t-Math.floor(t))*60;
    let ss=Math.floor(secEx+1e-9), fr=Math.round((secEx-ss)*11);
    if(fr===11){ss++;fr=0;}
    return {hh,mm,ss,fr};
  }
  function labelHTML(t){
    const p=parts(t);
    return `<span class="bt-time">${p.hh}:${pad(p.mm)}:${pad(p.ss)}</span>`+
           `<span class="bt-frac">${p.fr>0?p.fr+"⁄11 秒":"整"}</span>`;
  }
  function timeReadout(t){
    const p=parts(t); let s=`${p.hh}:${pad(p.mm)}:${pad(p.ss)}`;
    if(p.fr>0) s+=`<sup>${p.fr}⁄11</sup>`; return s;
  }

  const mod=v=>((v%360)+360)%360;
  function nearest(cur,target){ let d=mod(target-cur); if(d>180)d-=360; return cur+d; }
  function anglesFor(t){ return {h:mod(t*0.5), m:mod(t*6), s:mod(((t%1)*60)*6)}; }

  let cur={h:0,m:0,s:0}, mode="idle", anim=null, timeHTML=timeReadout(0);
  const ease=p=>p<.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;

  function setClock(t){
    exitLive();
    const A=anglesFor(t);
    anim={from:{...cur},to:{h:nearest(cur.h,A.h),m:nearest(cur.m,A.m),s:nearest(cur.s,A.s)},
          start:performance.now(),dur:750};
    mode="anim"; timeHTML=timeReadout(t);
  }
  function reset(){ setClock(0); }

  const btnLive=el("btnLive");
  function enterLive(){
    mode="live"; btnLive.classList.add("live");
    btnLive.querySelector(".dot").style.display="inline-block";
    el("liveText").textContent="現在時間(進行中)";
  }
  function exitLive(){
    if(btnLive.classList.contains("live")){
      btnLive.classList.remove("live");
      btnLive.querySelector(".dot").style.display="none";
      el("liveText").textContent="同步現在時間";
    }
    if(mode==="live") mode="idle";
  }
  btnLive.addEventListener("click",()=> mode==="live"?exitLive():enterLive());
  el("btnReset").addEventListener("click",()=>{ closePanel(); reset(); });

  function liveTargets(){
    const d=new Date(), s=d.getSeconds()+d.getMilliseconds()/1000,
          m=d.getMinutes()+s/60, h=(d.getHours()%12)+m/60;
    return {h:h*30,m:m*6,s:s*6,hh:d.getHours()%12||12,mm:d.getMinutes(),ss:d.getSeconds()};
  }

  const arcOn=()=>el("chkArc").checked;
  function render(){
    if(mode==="live"){
      const T=liveTargets();
      cur.h=nearest(cur.h,T.h); cur.m=nearest(cur.m,T.m); cur.s=nearest(cur.s,T.s);
      timeHTML=`${T.hh}:${pad(T.mm)}:${pad(T.ss)}`;
    }else if(mode==="anim"){
      const p=Math.min(1,(performance.now()-anim.start)/anim.dur), e=ease(p);
      cur.h=anim.from.h+(anim.to.h-anim.from.h)*e;
      cur.m=anim.from.m+(anim.to.m-anim.from.m)*e;
      cur.s=anim.from.s+(anim.to.s-anim.from.s)*e;
      if(p>=1) mode="idle";
    }
    el("handHour").setAttribute("transform",`rotate(${cur.h} ${CX} ${CY})`);
    el("handMin").setAttribute("transform",`rotate(${cur.m} ${CX} ${CY})`);
    el("handSec").setAttribute("transform",`rotate(${cur.s} ${CX} ${CY})`);
    updateReadout(); updateArc();
    requestAnimationFrame(render);
  }
  function fmtDeg(v){ const r=Math.round(v*10)/10; return (Number.isInteger(r)?r:r.toFixed(1))+"°"; }
  function updateReadout(){
    const h=mod(cur.h), m=mod(cur.m);
    let inc=Math.abs(m-h)%360; if(inc>180) inc=360-inc;
    el("roTime").innerHTML=timeHTML;
    el("roHour").textContent=fmtDeg(h);
    el("roMin").textContent=fmtDeg(m);
    el("roAngle").textContent=fmtDeg(inc);
    el("roRel").textContent=fmtDeg(mod(m-h));
  }
  function updateArc(){
    const card=el("clock");
    if(!arcOn()){ card.classList.add("arc-hidden"); return; }
    card.classList.remove("arc-hidden");
    const h=mod(cur.h), m=mod(cur.m), R=52;
    let d=mod(m-h), start,end;
    if(d<=180){ start=h; end=m; } else { start=m; end=h; d=360-d; }
    const rad=a=>a*Math.PI/180, P=(a,r)=>[CX+r*Math.sin(rad(a)),CY-r*Math.cos(rad(a))];
    const [x1,y1]=P(start,R), [x2,y2]=P(end,R), path=el("angleArc");
    path.setAttribute("d", d<0.15?"":`M ${x1} ${y1} A ${R} ${R} 0 0 1 ${x2} ${y2}`);
    const lead=mod(m-h); let col="var(--muted)";
    const near=(x,y)=>Math.abs(((x-y+540)%360)-180)<0.4;
    if(near(lead,0)) col="var(--c-overlap)";
    else if(near(lead,90)) col="var(--c-lead)";
    else if(near(lead,180)) col="var(--c-straight)";
    else if(near(lead,270)) col="var(--c-lag)";
    document.documentElement.style.setProperty("--arc",col);
    const mid=start+d/2, [lx,ly]=P(mid,R+16), lab=el("arcLabel"), bg=el("arcLabelBg");
    lab.setAttribute("x",lx); lab.setAttribute("y",ly); lab.textContent=fmtDeg(d);
    const w=lab.getComputedTextLength?Math.max(30,lab.getComputedTextLength()+10):40;
    bg.setAttribute("x",lx-w/2); bg.setAttribute("y",ly-11);
    bg.setAttribute("width",w); bg.setAttribute("height",22);
  }
  el("chkArc").addEventListener("change",updateArc);

  /* 2×2 分類 + 共用面板 */
  const catGrid=el("catGrid"), panel=el("catPanel"),
        cpTitle=el("cpTitle"), cpBody=el("cpBody");
  let curCat=-1;
  function closePanel(){ curCat=-1; panel.classList.remove("show");
    [...catGrid.children].forEach(c=>c.classList.remove("on")); }
  function openCat(i){
    if(curCat===i){ closePanel(); return; }
    curCat=i;
    [...catGrid.children].forEach((c,j)=>c.classList.toggle("on",j===i));
    const g=GROUPS[i];
    panel.style.setProperty("--gc",g.color);
    cpTitle.textContent=g.title+"（"+g.tag+"）";
    cpBody.innerHTML="";
    for(let k=0;k<11;k++){
      const t=(g.base+720*k)/11, b=document.createElement("button");
      b.className="tbtn"; b.innerHTML=labelHTML(t);
      b.addEventListener("click",()=>{ setClock(t); closePanel(); });
      cpBody.appendChild(b);
    }
    panel.classList.add("show");
  }
  GROUPS.forEach((g,i)=>{
    const c=document.createElement("button");
    c.className="cat"; c.style.setProperty("--gc",g.color);
    c.innerHTML=`<div class="cat-row"><span class="swatch"></span><span class="cat-badge">${g.tag}</span></div>
                 <span class="cat-title">${g.title}</span>`;
    c.addEventListener("click",()=>openCat(i));
    catGrid.appendChild(c);
  });
  el("cpClose").addEventListener("click",closePanel);

  requestAnimationFrame(render);
})();
</script>
</body>
</html>
