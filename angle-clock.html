<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>角度時鐘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14203a;          /* 深墨藍：時針、主要文字 */
    --minute:#2563eb;       /* 藍：分針 */
    --second:#e0492f;       /* 磚紅：秒針 */
    --paper:#eef1f6;        /* 背景 */
    --face:#ffffff;         /* 錶面 */
    --tick:#cbd5e1;         /* 細刻度 */
    --tick-major:#475569;   /* 粗刻度 */
    --muted:#64748b;
    --line:#dbe1ea;
    /* 四組類別色 */
    --c-overlap:#0d9488;    /* 重合 0° */
    --c-lead:#2563eb;       /* 領先 90° */
    --c-straight:#d97706;   /* 一直線 180° */
    --c-lag:#db2777;        /* 落後 90° */
    --arc:#0d9488;          /* 夾角弧線（動態換色） */
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Noto Sans TC",system-ui,-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
    background:
      radial-gradient(circle at 15% 0%, #f6f8fc 0%, transparent 55%),
      var(--paper);
    color:var(--ink);
    min-height:100vh;
    padding:22px 16px 48px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1000px;margin:0 auto;}
  header{margin:0 auto 20px;max-width:1000px;}
  h1{
    font-family:"Space Grotesk","Noto Sans TC",sans-serif;
    font-size:clamp(22px,4.6vw,30px);
    letter-spacing:.5px;margin:0;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;
  }
  h1 .en{font-size:.62em;color:var(--muted);font-weight:500;letter-spacing:2px;text-transform:uppercase;}
  .sub{color:var(--muted);font-size:14px;margin-top:6px;}

  .layout{display:flex;gap:26px;align-items:flex-start;}
  @media(max-width:820px){ .layout{flex-direction:column;align-items:stretch;} }

  /* ---------- 時鐘區 ---------- */
  .clock-col{flex:0 0 auto;width:min(420px,100%);margin:0 auto;}
  .clock-card{
    background:var(--face);
    border:1px solid var(--line);
    border-radius:22px;
    padding:18px 18px 14px;
    box-shadow:0 18px 40px -24px rgba(20,32,58,.4);
  }
  svg.clock{display:block;width:100%;height:auto;touch-action:none;}
  .num{font-family:"Space Grotesk",sans-serif;font-weight:700;fill:var(--ink);font-size:19px;}
  .hand{stroke-linecap:round;}
  #handHour{stroke:var(--ink);stroke-width:9;}
  #handMin{stroke:var(--minute);stroke-width:6;}
  #handSec{stroke:var(--second);stroke-width:2.4;}
  #arcLabelBg{fill:var(--face);}
  #arcLabel{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:15px;fill:var(--arc);}
  #angleArc{fill:none;stroke:var(--arc);stroke-width:3;stroke-linecap:round;opacity:.9;}
  .arc-hidden #angleArc,.arc-hidden #arcLabel,.arc-hidden #arcLabelBg{display:none;}

  /* 讀數 */
  .readout{
    margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px 10px;
  }
  .ro{
    background:#f8fafc;border:1px solid var(--line);border-radius:12px;
    padding:8px 11px;
  }
  .ro .k{font-size:11.5px;color:var(--muted);letter-spacing:.5px;}
  .ro .v{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:17px;margin-top:2px;line-height:1.15;}
  .ro.time{grid-column:1 / -1;}
  .ro.time .v{font-size:21px;color:var(--ink);}
  .ro.time .v sup{font-size:.55em;color:var(--muted);font-weight:500;}
  .ro.hour .v{color:var(--ink);}
  .ro.min .v{color:var(--minute);}
  .ro.angle .v{color:var(--arc);}
  .relnote{grid-column:1/-1;font-size:12.5px;color:var(--muted);text-align:center;margin-top:-2px;}
  .relnote b{color:var(--arc);font-family:"JetBrains Mono",monospace;}

  .toolbar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .tool{
    flex:1 1 auto;border:1px solid var(--line);background:#fff;color:var(--ink);
    font-family:inherit;font-size:14px;font-weight:500;padding:10px 12px;border-radius:12px;
    cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .tool:hover{border-color:var(--ink);}
  .tool:active{transform:translateY(1px);}
  .tool.live{background:var(--ink);color:#fff;border-color:var(--ink);}
  .tool.live .dot{width:7px;height:7px;border-radius:50%;background:var(--second);animation:blink 1s steps(2) infinite;}
  @keyframes blink{50%{opacity:.25;}}
  .chk{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);padding:6px 4px 0;cursor:pointer;user-select:none;}
  .chk input{accent-color:var(--arc);width:16px;height:16px;}

  /* 圖例 */
  .legend{display:flex;gap:14px;justify-content:center;margin-top:8px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .legend i{width:16px;height:4px;border-radius:3px;display:inline-block;}

  /* ---------- 控制區 ---------- */
  .panel{flex:1 1 340px;min-width:0;}
  .panel-head{font-size:13px;color:var(--muted);margin:2px 4px 10px;letter-spacing:.5px;}
  .group{
    border:1px solid var(--line);border-radius:16px;background:#fff;margin-bottom:12px;overflow:hidden;
    transition:border-color .15s;
  }
  .group.open{border-color:var(--gc,var(--ink));}
  .g-head{
    display:flex;align-items:center;gap:12px;width:100%;background:none;border:0;cursor:pointer;
    font-family:inherit;text-align:left;padding:15px 16px;color:var(--ink);
  }
  .g-head .swatch{width:12px;height:12px;border-radius:4px;background:var(--gc);flex:0 0 auto;}
  .g-title{font-size:15.5px;font-weight:700;flex:1;line-height:1.25;}
  .g-badge{
    font-family:"JetBrains Mono",monospace;font-weight:700;font-size:13px;
    color:var(--gc);background:color-mix(in srgb,var(--gc) 12%,#fff);
    padding:3px 9px;border-radius:999px;
  }
  .g-caret{transition:transform .2s;color:var(--muted);flex:0 0 auto;}
  .group.open .g-caret{transform:rotate(90deg);}
  .g-body{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 14px;
    max-height:0;opacity:0;transition:max-height .28s ease,opacity .2s,padding .28s;
  }
  .group.open .g-body{max-height:560px;opacity:1;padding:2px 14px 15px;}
  @media(max-width:400px){ .g-body{grid-template-columns:repeat(2,1fr);} }
  .tbtn{
    border:1px solid var(--line);background:#fff;border-radius:11px;cursor:pointer;
    font-family:inherit;padding:9px 4px;color:var(--ink);transition:.13s;line-height:1.1;
    display:flex;flex-direction:column;align-items:center;gap:1px;
  }
  .tbtn:hover{border-color:var(--gc);background:color-mix(in srgb,var(--gc) 7%,#fff);}
  .tbtn:active{transform:translateY(1px);}
  .tbtn.active{background:var(--gc);border-color:var(--gc);color:#fff;}
  .tbtn .bt-time{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:14.5px;letter-spacing:-.3px;}
  .tbtn .bt-frac{font-size:10.5px;opacity:.72;font-family:"JetBrains Mono",monospace;}
  .tbtn.active .bt-frac{opacity:.85;}

  footer{max-width:1000px;margin:24px auto 0;font-size:12px;color:var(--muted);text-align:center;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>角度時鐘 <span class="en">Angle Clock</span></h1>
    <div class="sub">探索時針與分針的角度關係:重合、垂直、成一直線。</div>
  </header>

  <div class="layout">
    <!-- 時鐘 -->
    <div class="clock-col">
      <div class="clock-card">
        <svg class="clock" id="clock" viewBox="0 0 400 400" aria-label="時鐘">
          <circle cx="200" cy="200" r="190" fill="var(--face)"/>
          <circle cx="200" cy="200" r="188" fill="none" stroke="var(--line)" stroke-width="2"/>
          <g id="ticks"></g>
          <g id="numbers"></g>
          <!-- 夾角弧線 -->
          <path id="angleArc" d=""></path>
          <rect id="arcLabelBg" x="0" y="0" width="0" height="0" rx="5"></rect>
          <text id="arcLabel" text-anchor="middle" dominant-baseline="central"></text>
          <!-- 指針 -->
          <line id="handHour" class="hand" x1="200" y1="216" x2="200" y2="120"></line>
          <line id="handMin"  class="hand" x1="200" y1="220" x2="200" y2="86"></line>
          <line id="handSec"  class="hand" x1="200" y1="226" x2="200" y2="72"></line>
          <circle cx="200" cy="200" r="8" fill="var(--ink)"></circle>
          <circle cx="200" cy="200" r="3.4" fill="var(--second)"></circle>
        </svg>

        <div class="legend">
          <span><i style="background:var(--ink)"></i>時針</span>
          <span><i style="background:var(--minute)"></i>分針</span>
          <span><i style="background:var(--second)"></i>秒針</span>
        </div>

        <div class="readout">
          <div class="ro time"><div class="k">目前時間</div><div class="v" id="roTime">12:00:00</div></div>
          <div class="ro hour"><div class="k">時針角度</div><div class="v" id="roHour">0°</div></div>
          <div class="ro min"><div class="k">分針角度</div><div class="v" id="roMin">0°</div></div>
          <div class="ro angle" style="grid-column:1/-1"><div class="k">兩針夾角</div><div class="v" id="roAngle">0°</div></div>
          <div class="relnote" id="roRel">分針領先時針 <b>0°</b></div>
        </div>

        <div class="toolbar">
          <button class="tool" id="btnLive"><span class="dot" style="display:none"></span><span id="liveText">同步現在時間</span></button>
          <button class="tool" id="btnReset">回到 12:00</button>
        </div>
        <label class="chk"><input type="checkbox" id="chkArc" checked>顯示夾角弧線與角度</label>
      </div>
    </div>

    <!-- 四組控制 -->
    <div class="panel">
      <div class="panel-head">選一個時間,時針與分針會轉到對應角度(角度以「12 點方向」為 0°,順時針計算)</div>
      <div id="groups"></div>
    </div>
  </div>

  <footer>
    每組在 12 小時內各有 11 個時間點。標示的秒數為精確值(<span style="font-family:'JetBrains Mono',monospace">n⁄11</span> 秒),可直接作為時鐘角度問題的標準答案。
  </footer>
</div>

<script>
(function(){
  "use strict";
  const CX=200, CY=200;
  const svgns="http://www.w3.org/2000/svg";
  const el=id=>document.getElementById(id);

  /* ---------- 建立刻度與數字 ---------- */
  const gTicks=el("ticks"), gNum=el("numbers");
  for(let i=0;i<60;i++){
    const a=i*6*Math.PI/180, major=(i%5===0);
    const r1=178, r2=major?162:170;
    const ln=document.createElementNS(svgns,"line");
    ln.setAttribute("x1",CX+r1*Math.sin(a)); ln.setAttribute("y1",CY-r1*Math.cos(a));
    ln.setAttribute("x2",CX+r2*Math.sin(a)); ln.setAttribute("y2",CY-r2*Math.cos(a));
    ln.setAttribute("stroke",major?"var(--tick-major)":"var(--tick)");
    ln.setAttribute("stroke-width",major?3:1.5);
    ln.setAttribute("stroke-linecap","round");
    gTicks.appendChild(ln);
  }
  for(let n=1;n<=12;n++){
    const a=n*30*Math.PI/180, R=142;
    const t=document.createElementNS(svgns,"text");
    t.setAttribute("x",CX+R*Math.sin(a)); t.setAttribute("y",CY-R*Math.cos(a));
    t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","central");
    t.setAttribute("class","num"); t.textContent=n;
    gNum.appendChild(t);
  }

  /* ---------- 四組資料 ----------
     相對角度(分針 - 時針)：重合 0、領先 90、一直線 180、落後 90(=270)
     t = (base + 720k)/11 分鐘(從 12:00 起算),k=0..10           */
  const GROUPS=[
    {title:"時針分針重合",       tag:"0°",   base:0,   color:"var(--c-overlap)"},
    {title:"分針領先時針 90°",   tag:"90°",  base:180, color:"var(--c-lead)"},
    {title:"時針分針成一直線",   tag:"180°", base:360, color:"var(--c-straight)"},
    {title:"分針落後時針 90°",   tag:"270°", base:540, color:"var(--c-lag)"},
  ];

  const pad=v=>String(v).padStart(2,"0");
  function parts(t){                         // t: 從12:00起算的分鐘(可含小數)
    let hh=Math.floor(t/60)%12; if(hh===0) hh=12;
    const mm=Math.floor(t)%60;
    const secEx=(t-Math.floor(t))*60;        // 該分內的秒(0~60)
    let ss=Math.floor(secEx+1e-9);
    let fr=Math.round((secEx-ss)*11);        // n/11
    if(fr===11){ss++;fr=0;}
    return {hh,mm,ss,fr};
  }
  function labelHTML(t){
    const p=parts(t);
    let s=`<span class="bt-time">${p.hh}:${pad(p.mm)}:${pad(p.ss)}</span>`;
    s+=`<span class="bt-frac">${p.fr>0?p.fr+"⁄11 秒":"整"}</span>`;
    return s;
  }
  function timeReadout(t){                    // 讀數用,含 sup 分數
    const p=parts(t);
    let s=`${p.hh}:${pad(p.mm)}:${pad(p.ss)}`;
    if(p.fr>0) s+=`<sup>${p.fr}⁄11</sup>`;
    return s;
  }

  /* ---------- 角度工具 ---------- */
  const mod=v=>((v%360)+360)%360;
  function nearest(cur,target){               // 讓 CSS 之外的 JS 動畫走最短路徑
    let d=mod(target-cur); if(d>180) d-=360; return cur+d;
  }
  function anglesFor(t){                       // 由時間 t 得到三針角度(0~360,12點為0)
    return {h:mod(t*0.5), m:mod(t*6), s:mod(((t%1)*60)*6)};
  }

  /* ---------- 動畫狀態 ---------- */
  let cur={h:0,m:0,s:0};                        // 目前顯示角度(連續,不取模)
  let mode="idle";                              // idle | anim | live
  let anim=null;                                // {from,to,start,dur}
  let timeHTML=timeReadout(0);
  const ease=p=>p<.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;

  function setClock(t){
    exitLive();
    const A=anglesFor(t);
    anim={ from:{...cur},
           to:{h:nearest(cur.h,A.h), m:nearest(cur.m,A.m), s:nearest(cur.s,A.s)},
           start:performance.now(), dur:750 };
    mode="anim";
    timeHTML=timeReadout(t);
  }
  function reset(){ setClock(0); }

  /* ---------- 即時真實時間 ---------- */
  const btnLive=el("btnLive");
  function enterLive(){
    mode="live"; btnLive.classList.add("live");
    btnLive.querySelector(".dot").style.display="inline-block";
    el("liveText").textContent="現在時間(進行中)";
    clearActive();
  }
  function exitLive(){
    if(btnLive.classList.contains("live")){
      btnLive.classList.remove("live");
      btnLive.querySelector(".dot").style.display="none";
      el("liveText").textContent="同步現在時間";
    }
    if(mode==="live") mode="idle";
  }
  btnLive.addEventListener("click",()=> mode==="live"?exitLive():enterLive());
  el("btnReset").addEventListener("click",()=>{ clearActive(); reset(); });

  function liveTargets(){
    const d=new Date();
    const s=d.getSeconds()+d.getMilliseconds()/1000;
    const m=d.getMinutes()+s/60;
    const h=(d.getHours()%12)+m/60;
    return {h:h*30, m:m*6, s:s*6, hh:d.getHours()%12||12, mm:d.getMinutes(), ss:d.getSeconds()};
  }

  /* ---------- 主迴圈 ---------- */
  const arcOn=()=>el("chkArc").checked;
  function render(){
    if(mode==="live"){
      const T=liveTargets();
      cur.h=nearest(cur.h,T.h); cur.m=nearest(cur.m,T.m); cur.s=nearest(cur.s,T.s);
      timeHTML=`${T.hh}:${pad(T.mm)}:${pad(T.ss)}`;
    }else if(mode==="anim"){
      const p=Math.min(1,(performance.now()-anim.start)/anim.dur), e=ease(p);
      cur.h=anim.from.h+(anim.to.h-anim.from.h)*e;
      cur.m=anim.from.m+(anim.to.m-anim.from.m)*e;
      cur.s=anim.from.s+(anim.to.s-anim.from.s)*e;
      if(p>=1) mode="idle";
    }
    el("handHour").setAttribute("transform",`rotate(${cur.h} ${CX} ${CY})`);
    el("handMin").setAttribute("transform",`rotate(${cur.m} ${CX} ${CY})`);
    el("handSec").setAttribute("transform",`rotate(${cur.s} ${CX} ${CY})`);
    updateReadout();
    updateArc();
    requestAnimationFrame(render);
  }

  function fmtDeg(v){ const r=Math.round(v*10)/10; return (Number.isInteger(r)?r:r.toFixed(1))+"°"; }
  function updateReadout(){
    const h=mod(cur.h), m=mod(cur.m);
    let inc=Math.abs(m-h)%360; if(inc>180) inc=360-inc;   // 夾角 0~180
    const lead=mod(m-h);                                   // 分針領先(0~360)
    el("roTime").innerHTML=timeHTML;
    el("roHour").textContent=fmtDeg(h);
    el("roMin").textContent=fmtDeg(m);
    el("roAngle").textContent=fmtDeg(inc);
    el("roRel").innerHTML=`分針領先時針 <b>${fmtDeg(lead)}</b>`;
  }

  /* 夾角弧線：由時針到分針畫較短弧,顏色隨關係變化 */
  function updateArc(){
    const card=el("clock");
    if(!arcOn()){ card.classList.add("arc-hidden"); return; }
    card.classList.remove("arc-hidden");
    const h=mod(cur.h), m=mod(cur.m), R=52;
    let d=mod(m-h), start,end;
    if(d<=180){ start=h; end=m; } else { start=m; end=h; d=360-d; }
    const rad=a=>a*Math.PI/180;
    const P=(a,r)=>[CX+r*Math.sin(rad(a)), CY-r*Math.cos(rad(a))];
    const [x1,y1]=P(start,R), [x2,y2]=P(end,R);
    const path=el("angleArc");
    if(d<0.15){ path.setAttribute("d",""); }
    else path.setAttribute("d",`M ${x1} ${y1} A ${R} ${R} 0 0 1 ${x2} ${y2}`);
    // 顏色：0=重合綠 / 90=藍 / 180=橙 / 270=粉,其餘中性
    const lead=mod(m-h); let col="var(--muted)";
    const near=(x,y)=>Math.abs(((x-y+540)%360)-180)<0.4;
    if(near(lead,0))   col="var(--c-overlap)";
    else if(near(lead,90))  col="var(--c-lead)";
    else if(near(lead,180)) col="var(--c-straight)";
    else if(near(lead,270)) col="var(--c-lag)";
    document.documentElement.style.setProperty("--arc",col);
    // 角度標籤
    const mid=start+d/2, [lx,ly]=P(mid,R+16);
    const lab=el("arcLabel"), bg=el("arcLabelBg");
    lab.setAttribute("x",lx); lab.setAttribute("y",ly);
    lab.textContent=fmtDeg(d);
    const w=lab.getComputedTextLength?Math.max(30,lab.getComputedTextLength()+10):40;
    bg.setAttribute("x",lx-w/2); bg.setAttribute("y",ly-11);
    bg.setAttribute("width",w); bg.setAttribute("height",22);
  }
  el("chkArc").addEventListener("change",updateArc);

  /* ---------- 建立四組按鈕 ---------- */
  let activeBtn=null;
  function clearActive(){ if(activeBtn){activeBtn.classList.remove("active");activeBtn=null;} }
  const groupsWrap=el("groups"); const sections=[];
  GROUPS.forEach((g,gi)=>{
    const sec=document.createElement("div");
    sec.className="group"; sec.style.setProperty("--gc",g.color);
    const head=document.createElement("button");
    head.className="g-head";
    head.innerHTML=`<span class="swatch"></span>
      <span class="g-title">${g.title}</span>
      <span class="g-badge">${g.tag}</span>
      <svg class="g-caret" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const body=document.createElement("div");
    body.className="g-body";
    for(let k=0;k<11;k++){
      const t=(g.base+720*k)/11;
      const b=document.createElement("button");
      b.className="tbtn"; b.innerHTML=labelHTML(t);
      b.addEventListener("click",()=>{
        clearActive(); b.classList.add("active"); activeBtn=b;
        setClock(t);
        sec.classList.remove("open");       // 選完收合
      });
      body.appendChild(b);
    }
    head.addEventListener("click",()=>{
      const willOpen=!sec.classList.contains("open");
      sections.forEach(s=>s.classList.remove("open"));
      if(willOpen) sec.classList.add("open");
    });
    sec.appendChild(head); sec.appendChild(body);
    groupsWrap.appendChild(sec); sections.push(sec);
  });

  /* 啟動 */
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
